<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termo bb 💖</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e7, #ffeef7);
    text-align: center;
    margin: 0;
    padding: 15px;
}

h1 {
    color: #ff4f81;
    font-size: 22px;
    margin-bottom: 5px;
}

p {
    margin-top: 0;
}

/* GRID RESPONSIVO */
#grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    max-width: 350px;
    margin: 20px auto;
}

/* CAIXAS */
.box {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    background: white;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 3px 6px rgba(0,0,0,0.15);
}

/* TECLADO */
#keyboard {
    max-width: 400px;
    margin: 10px auto;
}

.key {
    padding: 12px 8px;
    margin: 4px;
    border: none;
    border-radius: 8px;
    background: #ff8fb1;
    color: white;
    font-weight: bold;
    font-size: 14px;
}

/* CORES */
.green { background: #7ed957 !important; color: white; }
.yellow { background: #ffd966 !important; }
.gray { background: #bbb !important; }

button:active {
    transform: scale(0.95);
}

/* RESPONSIVO EXTRA */
@media (max-width: 400px) {
    .key {
        font-size: 12px;
        padding: 10px 6px;
    }
}
</style>
</head>

<body>

<h1>Termo da minha bbzinha 💕</h1>
<p>Descubra a palavra</p>

<div id="grid"></div>
<div id="keyboard"></div>

<script>
let tentativa = "";
let linha = 0;

function criarGrid() {
    let grid = document.getElementById("grid");
    for (let i = 0; i < 30; i++) {
        let div = document.createElement("div");
        div.className = "box";
        grid.appendChild(div);
    }
}

function criarTeclado() {
    let letras = "QWERTYUIOPASDFGHJKLZXCVBNM";
    let teclado = document.getElementById("keyboard");

    letras.split("").forEach(l => {
        let btn = document.createElement("button");
        btn.innerText = l;
        btn.className = "key";
        btn.onclick = () => digitar(l);
        teclado.appendChild(btn);
    });

    let enter = document.createElement("button");
    enter.innerText = "Enter";
    enter.className = "key";
    enter.onclick = enviar;
    teclado.appendChild(enter);
}

function digitar(letra) {
    if (tentativa.length < 5) {
        tentativa += letra.toLowerCase();
        atualizar();
    }
}

function atualizar() {
    let boxes = document.querySelectorAll(".box");
    for (let i = 0; i < tentativa.length; i++) {
        boxes[linha*5 + i].innerText = tentativa[i];
    }
}

async function enviar() {
    if (tentativa.length !== 5) return;

    let res = await fetch("/verificar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({tentativa})
    });

    let dados = await res.json();

    let boxes = document.querySelectorAll(".box");

    dados.cores.forEach((c, i) => {
        boxes[linha*5 + i].classList.add(c);
    });

    if (dados.ganhou) {
        setTimeout(() => alert("Te amo bb!! Você é perfeita! 💖"), 300);
    }

    tentativa = "";
    linha++;
}

criarGrid();
criarTeclado();
</script>

</body>
</html>
